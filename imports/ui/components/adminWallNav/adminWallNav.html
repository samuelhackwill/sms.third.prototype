<template name="AdminWallNav">
  <div class="relative z-40 mb-5 -mx-4 sm:mb-6 sm:-mx-6">
    <div class="sticky top-0 w-full border-y border-slate-800 bg-slate-950/95 py-3 backdrop-blur">
      <nav class="flex flex-wrap gap-2 px-4 sm:px-6">
        {{#each tabs}}
          <a
            href="{{path}}"
            class="rounded-lg px-3 py-2 text-xs font-medium transition sm:px-4 sm:text-sm {{#if isActive}}bg-slate-100 text-slate-950{{else}}text-slate-300 hover:bg-slate-900 hover:text-slate-100{{/if}}"
          >
            {{label}}
          </a>
        {{/each}}
      </nav>
    </div>
  </div>
</template>
