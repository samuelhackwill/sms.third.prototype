<template name="AdminTelevisionPage">
  <!-- admin wall nav inline -->
  <main class="mx-auto min-h-screen max-w-5xl bg-slate-950 px-6 py-8 text-slate-100">
    <div class="relative left-1/2 z-40 mb-6 w-screen -translate-x-1/2 px-6">
      <div class="sticky top-0 flex w-full flex-wrap items-center justify-between gap-3 border-y border-slate-800 bg-slate-950/95 px-4 py-3 backdrop-blur">
        <nav class="flex flex-wrap gap-2">
          {{#each adminWallTabs}}
            <a
              href="{{path}}"
              class="rounded-lg px-4 py-2 text-sm font-medium transition {{#if isActive}}bg-slate-100 text-slate-950{{else}}text-slate-300 hover:bg-slate-900 hover:text-slate-100{{/if}}"
            >
              {{label}}
            </a>
          {{/each}}
        </nav>
        <div class="flex flex-wrap justify-end gap-2">
          {{#each adminWallRouteTargets}}
            <button
              type="button"
              class="js-move-wall-clients rounded-lg border px-3 py-2 text-sm font-medium transition {{#if isActive}}border-slate-700 bg-slate-900 text-slate-500{{else}}border-slate-700 bg-slate-800 text-slate-100 hover:border-slate-600 hover:bg-slate-700{{/if}}"
              data-target="{{target}}"
              {{#if isActive}}disabled{{/if}}
            >
              {{label}}
            </button>
          {{/each}}
        </div>
      </div>
    </div>
    <h1 class="text-2xl font-semibold text-slate-50">Admin Television</h1>
    <p class="mt-2 text-sm text-slate-400">Control wall-wide video playback and route dedicated screens.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Playback</h2>
      <div class="mt-4 grid gap-4 lg:grid-cols-[1fr_auto]">
        <input
          id="televisionSourceUrl"
          class="w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100"
          type="url"
          placeholder="https://example.com/vertical-video.mp4"
          value="{{sourceUrlValue}}"
        />
        <div class="flex flex-wrap gap-2">
          <button type="button" class="js-play-url rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Play URL</button>
          <button type="button" class="js-stop-video rounded border border-red-800 bg-red-950 px-3 py-2 text-sm font-semibold text-red-100 hover:border-red-700 hover:bg-red-900">Stop</button>
        </div>
      </div>
      <div class="mt-3 text-sm text-slate-400">Current source: <span class="break-all text-slate-200">{{currentSource}}</span></div>
      <div class="mt-1 text-sm text-slate-400">Playback state: <span class="text-slate-200">{{playbackState}}</span></div>
      <div class="mt-4 rounded border border-slate-800 bg-slate-950 p-3">
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Local Public Sources</div>
        <div class="mt-3 flex flex-wrap gap-2">
          {{#each localSources}}
            <button
              type="button"
              class="js-play-local-source rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
              data-source-url="{{sourceUrl}}"
            >
              {{label}}
            </button>
          {{/each}}
        </div>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Routing</h2>
      <p class="mt-3 text-sm text-slate-400">Global client moves are available from the shared navigation bar above.</p>
    </section>
  </main>
</template>
