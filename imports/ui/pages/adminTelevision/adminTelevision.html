<template name="AdminTelevisionPage">
  <main class="mx-auto min-h-screen max-w-5xl bg-slate-950 px-6 py-8 text-slate-100">
    {{> AdminWallNav}}
    <h1 class="text-2xl font-semibold text-slate-50">Admin Television</h1>
    <p class="mt-2 text-sm text-slate-400">Control wall-wide video playback on the ticker wall screens.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Playback</h2>
      <div class="mt-4 grid gap-4 lg:grid-cols-[1fr_auto]">
        <input
          id="televisionSourceUrl"
          class="w-full rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100"
          type="url"
          placeholder="https://example.com/vertical-video.mp4"
          value="{{sourceUrlValue}}"
        />
        <div class="flex flex-wrap gap-2">
          <button type="button" class="js-load-url rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Load URL</button>
          <button type="button" class="js-play-loaded rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Play Loaded</button>
          <button type="button" class="js-refresh-clients rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Force Refresh Clients</button>
          <button type="button" class="js-toggle-debug rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">{{debugToggleLabel}}</button>
          <button type="button" class="js-stop-video rounded border border-red-800 bg-red-950 px-3 py-2 text-sm font-semibold text-red-100 hover:border-red-700 hover:bg-red-900">Stop</button>
        </div>
      </div>
      <div class="mt-3 text-sm text-slate-400">Current source: <span class="break-all text-slate-200">{{currentSource}}</span></div>
      <div class="mt-1 text-sm text-slate-400">Playback state: <span class="text-slate-200">{{playbackState}}</span></div>
      <div class="mt-4 rounded border border-slate-800 bg-slate-950 p-3">
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Nginx Video Sources</div>
        <div class="mt-2 text-xs text-slate-500">Root: <span class="text-slate-300">{{mediaRootDir}}</span></div>
        <div class="mt-1 text-xs text-slate-500">Base URL: <span class="text-slate-300">{{mediaBaseUrl}}</span></div>
        <div class="mt-3 flex flex-wrap gap-2">
          {{#each localSources}}
            <button
              type="button"
              class="js-load-local-source rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
              data-source-url="{{sourceUrl}}"
            >
              Load {{label}}
            </button>
          {{/each}}
        </div>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Routing</h2>
      <div class="mt-3 flex flex-wrap gap-2">
        <button type="button" class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700" data-action="move-all-clients-to-television">Move All Clients To /television</button>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Readiness Grid</h2>
        <span class="text-xs text-slate-500">Green = readyState 4</span>
      </div>
      <div class="grid gap-2">
        {{#each readinessRows}}
          <div class="grid grid-cols-5 gap-2">
            {{#each this}}
              <article class="min-h-24 rounded border p-2 text-xs {{statusClass}}">
                <div class="font-semibold">#{{slotNumber}} {{shortCode}}</div>
                <div class="mt-1">rs: {{readyState}}</div>
                <div>ns: {{networkState}}</div>
                <div>err: {{errorCode}}</div>
                <div class="truncate">{{playbackState}}</div>
              </article>
            {{/each}}
          </div>
        {{/each}}
      </div>
    </section>
  </main>
</template>
