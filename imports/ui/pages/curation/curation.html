<template name="CurationPage">
  <main class="mx-auto min-h-screen max-w-7xl bg-slate-950 px-6 py-8 font-sans text-slate-100">
    {{> AdminWallNav}}

    <h1 class="text-2xl font-semibold text-slate-50">Curation</h1>
    <p class="mt-2 text-sm text-slate-400">Review all ingested messages, set status, and delete records.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-4">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="text-sm text-slate-300">
          <span class="font-semibold">Messages:</span> {{messageCount}}
          <span class="ml-4 font-semibold">Selected:</span> {{selectedCount}}
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <select
            class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-100"
            data-action="bulk-action"
          >
            <option value="" selected={{isBulkActionSelected ''}}>Bulk action</option>
            <option value="featured" selected={{isBulkActionSelected 'featured'}}>Set featured</option>
            <option value="never_show" selected={{isBulkActionSelected 'never_show'}}>Set never show</option>
            <option value="delete" selected={{isBulkActionSelected 'delete'}}>Delete</option>
          </select>
          <button
            type="button"
            class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
            data-action="apply-bulk-action"
          >
            Apply
          </button>
        </div>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-950">
      <div class="border-b border-slate-800 px-4 py-3 text-sm text-slate-400">
        <label class="inline-flex items-center gap-2">
          <input type="checkbox" data-action="select-all" />
          <span>Select all visible messages</span>
        </label>
      </div>

      {{#if hasMessages}}
        <div class="divide-y divide-slate-800">
          {{#each messages}}
            <article class="grid gap-3 px-4 py-4 md:grid-cols-[auto_1fr_auto_auto] md:items-start">
              <label class="pt-1">
                <input
                  type="checkbox"
                  value="{{id}}"
                  checked={{isSelected}}
                  data-action="toggle-select"
                />
              </label>

              <div>
                <div class="text-sm text-slate-500">
                  <span class="font-medium text-slate-200">{{sender}}</span>
                  <span class="mx-2">·</span>
                  <span>{{receivedAtLabel}}</span>
                  <span class="mx-2">·</span>
                  <span>{{source}}</span>
                </div>
                <p class="mt-2 whitespace-pre-wrap break-words text-sm text-slate-100">{{body}}</p>
              </div>

              <label class="block">
                <span class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500">Status</span>
                <select
                  class="rounded border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100"
                  data-action="message-status"
                  data-message-id="{{id}}"
                >
                  <option value="raw" selected={{statusEquals status 'raw'}}>Raw</option>
                  <option value="featured" selected={{statusEquals status 'featured'}}>Featured</option>
                  <option value="never_show" selected={{statusEquals status 'never_show'}}>Never show</option>
                  <option value="approved" selected={{statusEquals status 'approved'}}>Approved</option>
                  <option value="hidden" selected={{statusEquals status 'hidden'}}>Hidden</option>
                  <option value="flagged" selected={{statusEquals status 'flagged'}}>Flagged</option>
                </select>
              </label>

              <div class="pt-6">
                <button
                  type="button"
                  class="rounded border border-red-900 bg-slate-900 px-3 py-2 text-sm text-red-300 hover:bg-red-950"
                  data-action="delete-message"
                  data-message-id="{{id}}"
                >
                  Delete
                </button>
              </div>
            </article>
          {{/each}}
        </div>
      {{else}}
        <div class="px-4 py-8 text-sm text-slate-500">No messages yet.</div>
      {{/if}}
    </section>
  </main>
</template>
