<template name="stage">
  <div class="relative h-screen w-screen overflow-hidden bg-black">
    <video
      id="stageBackgroundVideo"
      class="absolute inset-0 h-full w-full object-cover"
      muted
      loop
      playsinline
    ></video>
    <div class="pointer-events-none absolute inset-0 bg-black/35"></div>
    <div id="stageCanvasHost" class="absolute inset-0 h-full w-full"></div>
    {{#if hasCurationMessage}}
      {{#if isWordRevealMode}}
        <div class="pointer-events-none absolute inset-0 z-10 flex items-center justify-center px-10">
          <div class="relative inline-block max-w-[50vw]">
            <div class="inline-block rounded-[2.25rem] bg-[#0a84ff] px-8 py-6 text-left text-3xl font-medium leading-tight text-white shadow-[0_14px_40px_rgba(10,132,255,0.28)] md:px-10 md:py-7 md:text-5xl">
              {{#each curationWordTokens}}
                <span style="{{visibilityStyle}}">{{text}}</span>
              {{/each}}
            </div>
          </div>
        </div>
      {{else}}
        <div class="pointer-events-none absolute inset-0 z-10 flex items-center justify-center px-10">
          <div class="max-w-5xl text-center text-4xl font-semibold leading-tight text-white drop-shadow-[0_4px_24px_rgba(0,0,0,0.85)] md:text-6xl">
            {{#each curationMessageLines}}
              <div style="{{animationStyle}}">{{text}}</div>
            {{/each}}
          </div>
        </div>
      {{/if}}
    {{/if}}
    <button
      type="button"
      class="absolute bottom-3 right-3 z-10 rounded border border-white/15 bg-black/20 px-2 py-1 text-[10px] uppercase tracking-[0.18em] text-white/50 transition hover:bg-black/35 hover:text-white/80"
      data-action="toggle-sound"
    >
      {{soundToggleLabel}}
    </button>
    <!-- <div class="fixed bottom-3 left-3 max-w-[96vw] rounded-md border border-cyan-300/35 bg-black/60 p-2.5 font-mono text-xs leading-snug text-cyan-200">
      <strong>last event:</strong>
      <code>{{lastEvent}}</code>
    </div> -->
  </div>
</template>

<template name="home">
  <main class="mx-auto max-w-3xl p-6">
    <h1 class="text-2xl font-semibold">SMS System - Third Prototype</h1>
    <ul class="mt-3 list-disc pl-5">
      <li>Open <code>/stage</code></li>
      <li>Open <code>/admin/stage</code></li>
      <li>Open <code>/curation</code></li>
    </ul>
  </main>
</template>
