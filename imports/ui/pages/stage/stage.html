<template name="stage">
  <div class="relative h-screen w-screen overflow-hidden bg-black">
    <video
      id="stageBackgroundVideo"
      class="absolute inset-0 h-full w-full object-cover"
      muted
      loop
      playsinline
    ></video>
    <div class="pointer-events-none absolute inset-0 bg-black/35"></div>
    <div id="stageCanvasHost" class="absolute inset-0 h-full w-full"></div>
    {{#if hasCurationMessage}}
      {{#if isWordRevealMode}}
        <div class="pointer-events-none absolute inset-0 z-10 flex items-center justify-center px-10">
          <div class="relative inline-block max-w-[50vw]">
            <div class="inline-block rounded-[2.25rem] bg-[#0a84ff] px-8 py-6 text-left text-3xl font-medium leading-tight text-white shadow-[0_14px_40px_rgba(10,132,255,0.28)] md:px-10 md:py-7 md:text-5xl">
              {{#each curationWordTokens}}
                <span style="{{visibilityStyle}}">{{text}}</span>
              {{/each}}
            </div>
          </div>
        </div>
      {{else}}
        <div class="pointer-events-none absolute inset-0 z-10 flex items-center justify-center px-10">
          <div class="max-w-5xl text-center text-4xl font-semibold leading-tight text-white drop-shadow-[0_4px_24px_rgba(0,0,0,0.85)] md:text-6xl">
            {{#each curationMessageLines}}
              <div style="{{animationStyle}}">{{text}}</div>
            {{/each}}
          </div>
        </div>
      {{/if}}
    {{/if}}
    <button
      type="button"
      class="absolute bottom-3 right-3 z-10 rounded border border-white/15 bg-black/20 px-2 py-1 text-[10px] uppercase tracking-[0.18em] text-white/50 transition hover:bg-black/35 hover:text-white/80"
      data-action="toggle-sound"
    >
      {{soundToggleLabel}}
    </button>
    <!-- <div class="fixed bottom-3 left-3 max-w-[96vw] rounded-md border border-cyan-300/35 bg-black/60 p-2.5 font-mono text-xs leading-snug text-cyan-200">
      <strong>last event:</strong>
      <code>{{lastEvent}}</code>
    </div> -->
  </div>
</template>

<template name="home">
  <main class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto flex max-w-6xl flex-col gap-8 px-6 py-8">
      <header class="space-y-2">
        <p class="text-xs uppercase tracking-[0.35em] text-cyan-300/70">Show Control</p>
        <h1 class="text-3xl font-semibold tracking-tight">SMS System - Third Prototype</h1>
      </header>

      <section class="grid gap-6 lg:grid-cols-[1.2fr_0.9fr]">
        <div class="flex flex-col gap-6">
          <div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-[0_20px_60px_rgba(0,0,0,0.35)]">
            <div class="flex items-start justify-between gap-4">
              <div>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Sanity Check</p>
                <h2 class="mt-2 text-xl font-semibold text-white">Tenda Router Reachability</h2>
                <p class="mt-1 text-sm text-slate-400">Target: <code>10.73.73.5</code></p>
              </div>
              <button
                type="button"
                class="rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700"
                data-action="refresh-router-check"
              >
                Refresh
              </button>
            </div>

            <div class="mt-5 rounded-2xl border border-slate-800 bg-black/20 p-4">
              <div class="flex items-center gap-3">
                <div class="h-3 w-3 rounded-full {{routerStatusDotClass}}"></div>
                <div class="text-base font-medium text-white">{{routerStatusLabel}}</div>
              </div>
              <div class="mt-3 grid gap-2 text-sm text-slate-300 sm:grid-cols-2">
                <div>Latency: <strong class="text-white">{{routerLatencyLabel}}</strong></div>
                <div>Last check: <strong class="text-white">{{routerCheckedAtLabel}}</strong></div>
                {{#if routerError}}
                  <div class="sm:col-span-2">Error: <strong class="text-rose-300">{{routerError}}</strong></div>
                {{/if}}
              </div>
            </div>
          </div>

          <div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-[0_20px_60px_rgba(0,0,0,0.35)]">
            <div class="flex items-start justify-between gap-4">
              <div>
                <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Worker Check</p>
                <h2 class="mt-2 text-xl font-semibold text-white">Tenda Router Scraper</h2>
                <p class="mt-1 text-sm text-slate-400">Python daemon health and last heartbeat.</p>
              </div>
              <button
                type="button"
                class="rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700"
                data-action="refresh-scraper-check"
              >
                Refresh
              </button>
            </div>

            <div class="mt-5 rounded-2xl border border-slate-800 bg-black/20 p-4">
              <div class="flex items-center gap-3">
                <div class="h-3 w-3 rounded-full {{scraperStatusDotClass}}"></div>
                <div class="text-base font-medium text-white">{{scraperStatusLabel}}</div>
              </div>
              <div class="mt-3 grid gap-2 text-sm text-slate-300 sm:grid-cols-2">
                <div>PID: <strong class="text-white">{{scraperPidLabel}}</strong></div>
                <div>Heartbeat age: <strong class="text-white">{{scraperHeartbeatAgeLabel}}</strong></div>
                <div>Last ingest count: <strong class="text-white">{{scraperLastIngestCountLabel}}</strong></div>
                <div>Last heartbeat: <strong class="text-white">{{scraperCheckedAtLabel}}</strong></div>
                {{#if scraperError}}
                  <div class="sm:col-span-2">Error: <strong class="text-rose-300">{{scraperError}}</strong></div>
                {{/if}}
              </div>
            </div>
          </div>
        </div>

        <div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-[0_20px_60px_rgba(0,0,0,0.35)]">
          <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Provisioning</p>
          <h2 class="mt-2 text-xl font-semibold text-white">Ticker QR Code</h2>
          <p class="mt-1 text-sm text-slate-400">Flash this on the iPhones to open <code>/ticker</code>.</p>

          <div class="mt-5 flex min-h-[320px] items-center justify-center rounded-2xl border border-slate-800 bg-white p-4">
            {{#if tickerQrCodeDataUrl}}
              <img src="{{tickerQrCodeDataUrl}}" alt="QR code to /ticker" class="h-auto w-full max-w-[320px]" />
            {{else}}
              <div class="text-sm text-slate-500">Generating QR code...</div>
            {{/if}}
          </div>

          <div class="mt-4 break-all rounded-xl border border-slate-800 bg-black/20 px-3 py-2 font-mono text-xs text-slate-300">
            {{tickerUrl}}
          </div>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-800 bg-slate-900/80 p-6 shadow-[0_20px_60px_rgba(0,0,0,0.35)]">
        <div class="flex flex-wrap gap-3">
          <a href="/admin/ticker" class="rounded-lg border border-cyan-500/30 bg-cyan-500/10 px-4 py-2 text-sm font-medium text-cyan-100 transition hover:bg-cyan-500/20">Open /admin/ticker</a>
          <a href="/ticker" class="rounded-lg border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700">Open /ticker</a>
          <a href="/stage" class="rounded-lg border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700">Open /stage</a>
          <a href="/admin/stage" class="rounded-lg border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700">Open /admin/stage</a>
          <a href="/curation" class="rounded-lg border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700">Open /curation</a>
          <a href="/video" class="rounded-lg border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700">Open /video</a>
          <a href="/admin/video" class="rounded-lg border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700">Open /admin/video</a>
          <a href="/admin/push" class="rounded-lg border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-medium text-slate-100 transition hover:border-slate-600 hover:bg-slate-700">Open /admin/push</a>
        </div>
      </section>
    </div>
  </main>
</template>
