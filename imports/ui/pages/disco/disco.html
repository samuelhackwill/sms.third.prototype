<template name="DiscoPage">
  <main id="discoRoot" class="relative isolate h-screen w-screen overflow-hidden bg-black text-white">
    {{#if isProvisioningMode}}
      <div class="pointer-events-none fixed inset-0 bg-cyan-500/80" style="animation: ticker-provisioning-blink 950ms ease-in-out infinite;"></div>
      <div class="pointer-events-none fixed inset-0 flex items-center justify-center">
        <div class="rounded-2xl border border-cyan-200/70 bg-black/70 px-8 py-6 text-center font-mono shadow-2xl">
          <div class="text-sm uppercase tracking-[0.35em] text-cyan-200">Provisioning</div>
          <div class="mt-3 text-7xl font-bold text-white">{{shortCode}}</div>
          <div class="mt-3 text-sm text-cyan-100">Tap this phone to assign its slot.</div>
        </div>
      </div>
    {{/if}}

    {{#if showDebug}}
      <div class="pointer-events-none fixed left-3 top-3 rounded bg-black/60 px-2 py-1 font-mono text-6xl text-cyan-200">
        <div>client: {{shortCode}}</div>
        <div>slot: {{slotIndex}}</div>
        <div>row: {{rowIndex}}</div>
        <div>col: {{colIndex}}</div>
        <div>mode: {{discoMode}}</div>
        <div>interval: {{columnIntervalMs}}</div>
        <div>step: {{columnStep}}</div>
        <div>color: {{activeColor}}</div>
      </div>
    {{/if}}
  </main>
</template>
