<template name="AdminVideoPage">
  <main class="mx-auto min-h-screen max-w-4xl bg-slate-950 px-6 py-8 text-slate-100">
    {{> AdminWallNav}}
    <h1 class="text-2xl font-semibold text-slate-50">Admin Video</h1>
    <p class="mt-2 text-sm text-slate-400">Control the dedicated video clients.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Routing</h2>
      <div class="mt-3 flex flex-wrap gap-3">
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="move-all-clients-to-video"
        >
          Move All Clients To /video
        </button>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="refresh-clients"
        >
          Force Refresh Clients
        </button>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="toggle-video-debug"
        >
          {{debugToggleLabel}}
        </button>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="toggle-video-auto-advance"
        >
          {{autoAdvanceToggleLabel}}
        </button>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Display Mode</h2>
      <div class="mt-3 flex flex-col gap-3 text-sm text-slate-200">
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-display-mode"
            value="fifo"
            checked="{{fifoCheckedAttr}}"
          />
          <span>FIFO</span>
        </label>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Tag</h2>
      <div class="mt-3 flex flex-col gap-3 text-sm text-slate-200">
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-tag"
            value="kiss"
            checked="{{kissCheckedAttr}}"
          />
          <span>kiss</span>
        </label>
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-tag"
            value="dance"
            checked="{{danceCheckedAttr}}"
          />
          <span>dance</span>
        </label>
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-tag"
            value="cry"
            checked="{{cryCheckedAttr}}"
          />
          <span>cry</span>
        </label>
      </div>
    </section>
  </main>
</template>
