<template name="AdminVideoPage">
  <main class="mx-auto min-h-screen max-w-4xl bg-slate-950 px-6 py-8 text-slate-100">
    {{> AdminWallNav}}
    <h1 class="text-2xl font-semibold text-slate-50">Admin Video</h1>
    <p class="mt-2 text-sm text-slate-400">Control the dedicated video clients.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Routing</h2>
      <div class="mt-3 flex flex-wrap gap-3">
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="move-all-clients-to-video"
        >
          Move All Clients To /video
        </button>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="refresh-clients"
        >
          Force Refresh Clients
        </button>
        <button
          type="button"
          class="rounded border border-emerald-700 bg-emerald-900 px-3 py-2 text-sm font-semibold text-emerald-100 hover:bg-emerald-800"
          data-action="start-batch"
        >
          Start Batch
        </button>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="toggle-video-debug"
        >
          {{debugToggleLabel}}
        </button>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700 {{#if isAutoAdvanceEnabled}}animate-pulse{{/if}}"
          data-action="toggle-video-auto-advance"
        >
          {{autoAdvanceToggleLabel}}
        </button>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="toggle-video-trim-clips"
        >
          {{trimClipsToggleLabel}}
        </button>
        <button
          type="button"
          class="rounded border border-red-500 bg-red-600 px-3 py-2 text-sm font-semibold text-white hover:bg-red-700"
          data-action="panic-stop"
        >
          PANIC STOP
        </button>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Display Mode</h2>
      <div class="mt-3 flex flex-col gap-3 text-sm text-slate-200">
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-display-mode"
            value="fifo"
            checked="{{fifoCheckedAttr}}"
          />
          <span>FIFO</span>
        </label>
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-display-mode"
            value="sync_batch"
            checked="{{syncBatchCheckedAttr}}"
          />
          <span>Sync Batch</span>
        </label>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Playback Tuning</h2>
        <button
          type="submit"
          form="videoPlaybackTuningForm"
          class="rounded border border-sky-700 bg-sky-900 px-3 py-2 text-sm font-semibold text-sky-100 hover:bg-sky-800"
        >
          Apply
        </button>
      </div>
      <form id="videoPlaybackTuningForm" class="mt-3 grid gap-3 md:grid-cols-2" data-action="playback-tuning">
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>Trim Start Offset (s)</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100" type="number" step="0.1" min="0" name="trimStartOffsetSec" value="{{trimStartOffsetSec}}" />
        </label>
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>Trim End Offset (s)</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100" type="number" step="0.1" min="0" name="trimEndOffsetSec" value="{{trimEndOffsetSec}}" />
        </label>
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>Start Fade Duration (ms)</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100" type="number" step="50" min="0" name="revealDurationMs" value="{{revealDurationMs}}" />
        </label>
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>End Fade Duration (ms)</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100" type="number" step="50" min="0" name="fadeOutDurationMs" value="{{fadeOutDurationMs}}" />
        </label>
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>Batch End Fade Duration (ms)</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100" type="number" step="50" min="0" name="syncBatchFadeOutDurationMs" value="{{syncBatchFadeOutDurationMs}}" />
        </label>
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>End Fade Lead (ms)</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100" type="number" step="50" min="0" name="fadeOutLeadMs" value="{{fadeOutLeadMs}}" />
        </label>
      </form>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Batch Readiness</h2>
        <span class="text-xs text-slate-500">State: {{videoBatchState}}</span>
      </div>
      <div class="mt-3 grid gap-2">
        {{#each readinessRows}}
          <div class="grid grid-cols-5 gap-2">
            {{#each this}}
              <div class="min-h-20 rounded border p-2 text-xs {{statusClass}}">
                <div class="font-semibold">#{{slotNumber}} · {{shortCode}}</div>
                <div class="mt-2">rs: {{readyState}}</div>
                <div>ns: {{networkState}}</div>
                <div>err: {{errorCode}}</div>
                <div class="truncate">{{playbackState}}</div>
              </div>
            {{/each}}
          </div>
        {{/each}}
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Tag</h2>
      <div class="mt-3 flex flex-col gap-3 text-sm text-slate-200">
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-tag"
            value="kiss"
            checked="{{kissCheckedAttr}}"
          />
          <span>kiss</span>
        </label>
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-tag"
            value="dance"
            checked="{{danceCheckedAttr}}"
          />
          <span>dance</span>
        </label>
        <label class="flex items-center gap-3">
          <input
            type="radio"
            name="video-tag"
            value="cry"
            checked="{{cryCheckedAttr}}"
          />
          <span>cry</span>
        </label>
      </div>
    </section>
  </main>
</template>
