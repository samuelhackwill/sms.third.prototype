<template name="AdminTickerPage">
  <main class="mx-auto min-h-screen max-w-7xl bg-slate-950 px-6 py-8 text-slate-100">
    {{> AdminWallNav}}
    <h1 class="text-2xl font-semibold text-slate-50">Admin Ticker</h1>
    <p class="mt-2 text-sm text-slate-400">Drag cards to reorder screens. Hold card to highlight client.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-4">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Provisioning Grid</h2>
        <span class="text-xs text-slate-500">6 rows x 5 phones</span>
      </div>

      <div class="grid gap-2">
        {{#each provisioningRows}}
          <div class="grid grid-cols-5 gap-2">
            {{#each this}}
              <div class="min-h-20 rounded border border-slate-800 bg-slate-950 p-2 text-xs">
                <div class="font-semibold text-slate-500">#{{slotNumber}}</div>
                {{#if shortCode}}
                  <div class="mt-2 text-lg font-bold text-slate-100">{{shortCode}}</div>
                  <div class="truncate text-slate-500">{{clientId}}</div>
                {{else}}
                  <div class="mt-3 text-slate-400">Waiting...</div>
                {{/if}}
              </div>
            {{/each}}
          </div>
        {{/each}}
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Controls</h2>
      <div class="mt-4 grid gap-4 lg:grid-cols-2">
        <div class="rounded border border-slate-800 bg-slate-950 p-3">
          <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Playback</div>
          <div class="mt-3 flex flex-wrap gap-4 text-sm text-slate-300">
            {{#each fakeMessageSources}}
              <label class="inline-flex items-center gap-2">
                <input type="radio" name="fake-message-source" value="{{key}}" checked="{{checked}}" />
                <span>{{label}}</span>
              </label>
            {{/each}}
          </div>
          <div class="mt-3 flex flex-wrap items-center gap-2">
            <label for="tickerSpeedInput" class="text-sm text-slate-300">Speed px/s</label>
            <input id="tickerSpeedInput" class="w-24 rounded border border-slate-700 bg-slate-900 px-2 py-1 text-sm text-slate-100" type="number" min="1" value="{{wall.speedPxPerSec}}" />
            <button type="button" class="js-set-speed rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Set Speed</button>
            <button type="button" class="js-send-random-text rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Send Next Fake Text</button>
            <button type="button" class="js-toggle-bucket-mode rounded border border-amber-900 bg-amber-950 px-3 py-1.5 text-sm font-semibold text-amber-100 hover:border-amber-700 hover:bg-amber-900 {{#if isBucketModeEnabled}}animate-pulse{{/if}}">{{bucketModeButtonLabel}}</button>
            <button type="button" class="js-empty-bucket rounded border border-amber-700 bg-amber-800 px-3 py-1.5 text-sm font-semibold text-amber-50 hover:border-amber-600 hover:bg-amber-700 disabled:cursor-not-allowed disabled:opacity-40" {{emptyBucketDisabledAttr}}>{{emptyBucketButtonLabel}}</button>
            <button type="button" class="js-toggle-barthes-mode rounded border border-cyan-900 bg-cyan-950 px-3 py-1.5 text-sm font-semibold text-cyan-100 hover:border-cyan-700 hover:bg-cyan-900 {{#if isBarthesMode}}animate-pulse{{/if}}">{{barthesModeButtonLabel}}</button>
          </div>
        </div>

        <div class="rounded border border-slate-800 bg-slate-950 p-3">
          <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Screens</div>
          <div class="mt-3 flex flex-wrap items-center gap-2">
            <button type="button" class="js-refresh-clients rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Force Refresh Clients</button>
            <button type="button" class="js-move-all-clients-to-ticker rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">Move All Clients To /ticker</button>
            <button type="button" class="js-toggle-provisioning rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">{{provisioningButtonLabel}}</button>
            <button type="button" class="js-toggle-debug rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-100 hover:border-slate-600 hover:bg-slate-700">{{debugButtonLabel}}</button>
          </div>
        </div>
      </div>

      <div class="mt-4 rounded border border-red-950 bg-red-950/40 p-3">
        <div class="text-xs font-semibold uppercase tracking-wide text-red-300">Danger Zone</div>
        <div class="mt-3 flex flex-wrap items-center gap-2">
          <button type="button" class="js-reset-ticker rounded border border-red-800 bg-red-950 px-3 py-1.5 text-sm font-semibold text-red-100 hover:border-red-700 hover:bg-red-900">Reset Ticker State</button>
          <button type="button" class="js-kill-clients rounded border border-red-800 bg-red-950 px-3 py-1.5 text-sm font-semibold text-red-100 hover:border-red-700 hover:bg-red-900">Kill Clients</button>
          <button type="button" class="js-panic-stop rounded border border-red-500 bg-red-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-red-700">PANIC STOP</button>
        </div>
      </div>

      <div class="mt-4 rounded border border-slate-800 bg-slate-950 p-3">
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Display Mode</div>
        <div class="mt-3 flex flex-wrap gap-4 text-sm text-slate-300">
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerDisplayMode" value="chorus" checked="{{isDisplayModeChorus}}" />
            <span>Multi-line chorus</span>
          </label>
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerDisplayMode" value="wall" checked="{{isDisplayModeWall}}" />
            <span>Delayed canon</span>
          </label>
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerDisplayMode" value="vertical" checked="{{isDisplayModeVertical}}" />
            <span>One line over matrix</span>
          </label>
        </div>
      </div>

      <div class="mt-4 rounded border border-slate-800 bg-slate-950 p-3">
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Renderer</div>
        <div class="mt-3 flex flex-wrap gap-4 text-sm text-slate-300">
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerRendererMode" value="bitmap" checked="{{isRendererModeBitmap}}" />
            <span>Bitmap Text</span>
          </label>
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerRendererMode" value="text" checked="{{isRendererModeText}}" />
            <span>Pixi Text 😗</span>
          </label>
        </div>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Status</h2>
      <div class="mt-3 grid gap-2 text-sm">
        <div><span class="font-semibold">activeClients:</span> {{activeClientCount}}</div>
        <div><span class="font-semibold">totalWallWidth:</span> {{wall.totalWallWidth}}</div>
        <div><span class="font-semibold">displayMode:</span> {{wall.displayMode}}</div>
        <div><span class="font-semibold">rendererMode:</span> {{wall.rendererMode}}</div>
        <div><span class="font-semibold">specialMode:</span> {{wall.specialMode}}</div>
        <div><span class="font-semibold">barthesCursor:</span> {{wall.barthesCursor}}</div>
        <div><span class="font-semibold">provisioningEnabled:</span> {{wall.provisioningEnabled}}</div>
        <div><span class="font-semibold">queueMachineState:</span> {{queueMachineState}}</div>
        <div><span class="font-semibold">queueDispatchMode:</span> {{queueDispatchMode}}</div>
        <div><span class="font-semibold">queueDepth:</span> {{queueDepth}}</div>
        <div><span class="font-semibold">playing:</span> {{playingSummary}}</div>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Row FSM</h2>
      <div class="mt-3 grid gap-2 md:grid-cols-2 xl:grid-cols-3">
        {{#each tickerRows}}
          <article class="rounded border border-slate-800 bg-slate-950 p-3 text-sm">
            <div class="font-semibold text-slate-100">Row {{rowNumber}}</div>
            <div class="mt-2 text-slate-400">state: <span class="text-slate-200">{{state}}</span></div>
            <div class="text-slate-400">widthPx: <span class="text-slate-200">{{widthPx}}</span></div>
            <div class="text-slate-400">activeClients: <span class="text-slate-200">{{activeClientCount}}</span></div>
            <div class="mt-2 truncate text-xs text-slate-500">{{rowContent}}</div>
          </article>
        {{/each}}
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Featured Messages</h2>
        <span class="text-xs text-slate-500">Click a message to send it to the ticker</span>
      </div>

      {{#if hasFeaturedMessages}}
        <div class="mt-3 max-h-[32rem] overflow-y-auto rounded border border-slate-800 bg-slate-950">
          <div class="divide-y divide-slate-800">
            {{#each featuredMessages}}
              <button
                type="button"
                class="js-send-featured-message block w-full px-4 py-3 text-left transition hover:bg-slate-900"
                data-message-id="{{id}}"
              >
                <div class="text-xs text-slate-500">
                  <span class="font-semibold text-slate-300">{{senderLabel}}</span>
                  <span class="mx-2">·</span>
                  <span>{{receivedAtLabel}}</span>
                </div>
                <div class="mt-2 break-words text-sm text-slate-100">{{body}}</div>
              </button>
            {{/each}}
          </div>
        </div>
      {{else}}
        <div class="mt-3 rounded border border-slate-800 bg-slate-950 px-4 py-8 text-sm text-slate-500">
          No featured messages in curation yet.
        </div>
      {{/if}}
    </section>
  </main>
</template>
