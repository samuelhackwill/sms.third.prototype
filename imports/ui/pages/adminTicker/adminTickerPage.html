<template name="AdminTickerPage">
  <main class="mx-auto min-h-screen max-w-7xl bg-slate-950 px-6 py-8 text-slate-100">
    <h1 class="text-2xl font-semibold text-slate-50">Admin Ticker</h1>
    <p class="mt-2 text-sm text-slate-400">Drag cards to reorder screens. Hold card to highlight client.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-4">
      <div class="mb-3 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Provisioning Grid</h2>
        <span class="text-xs text-slate-500">6 rows x 5 phones</span>
      </div>

      <div class="grid gap-2">
        {{#each provisioningRows}}
          <div class="grid grid-cols-5 gap-2">
            {{#each this}}
              <div class="min-h-20 rounded border border-slate-800 bg-slate-950 p-2 text-xs">
                <div class="font-semibold text-slate-500">#{{slotNumber}}</div>
                {{#if shortCode}}
                  <div class="mt-2 text-lg font-bold text-slate-100">{{shortCode}}</div>
                  <div class="truncate text-slate-500">{{clientId}}</div>
                {{else}}
                  <div class="mt-3 text-slate-400">Waiting...</div>
                {{/if}}
              </div>
            {{/each}}
          </div>
        {{/each}}
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Controls</h2>
      <div class="mt-3 flex flex-wrap items-center gap-2">
        <label for="tickerSpeedInput" class="text-sm text-slate-300">Speed px/s</label>
        <input id="tickerSpeedInput" class="w-24 rounded border border-slate-700 bg-slate-950 px-2 py-1 text-sm text-slate-100" type="number" min="1" value="{{wall.speedPxPerSec}}" />
        <button type="button" class="js-set-speed rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm text-slate-100 hover:bg-slate-700">Set Speed</button>

        <button type="button" class="js-send-random-text rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm text-slate-100 hover:bg-slate-700">Send Random Text</button>
        <button type="button" class="js-move-ticker-clients-to-video rounded border border-violet-900 bg-violet-950 px-3 py-1.5 text-sm text-violet-200 hover:bg-violet-900">Move Ticker Clients To /video</button>
        <button type="button" class="js-refresh-clients rounded border border-blue-900 bg-blue-950 px-3 py-1.5 text-sm text-blue-200 hover:bg-blue-900">Force Refresh Clients</button>
        <button type="button" class="js-reset-ticker rounded border border-red-900 bg-red-950 px-3 py-1.5 text-sm text-red-200 hover:bg-red-900">Reset Ticker State</button>
        <button type="button" class="js-toggle-provisioning rounded border border-amber-900 bg-amber-950 px-3 py-1.5 text-sm text-amber-200 hover:bg-amber-900">{{provisioningButtonLabel}}</button>
        <button type="button" class="js-toggle-debug rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm text-slate-100 hover:bg-slate-700">{{debugButtonLabel}}</button>
        <button type="button" class="js-panic-stop rounded border border-red-500 bg-red-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-red-700">PANIC STOP</button>
        <button type="button" class="js-kill-clients rounded border border-red-900 bg-slate-800 px-3 py-1.5 text-sm text-red-300 hover:bg-red-950">Kill Clients</button>
      </div>

      <div class="mt-4 rounded border border-slate-800 bg-slate-950 p-3">
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Display Mode</div>
        <div class="mt-3 flex flex-wrap gap-4 text-sm text-slate-300">
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerDisplayMode" value="chorus" checked="{{isDisplayModeChorus}}" />
            <span>Multi-line chorus</span>
          </label>
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerDisplayMode" value="wall" checked="{{isDisplayModeWall}}" />
            <span>Delayed canon</span>
          </label>
          <label class="inline-flex items-center gap-2">
            <input type="radio" name="tickerDisplayMode" value="vertical" checked="{{isDisplayModeVertical}}" />
            <span>One line over matrix</span>
          </label>
        </div>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Status</h2>
      <div class="mt-3 grid gap-2 text-sm">
        <div><span class="font-semibold">activeClients:</span> {{activeClientCount}}</div>
        <div><span class="font-semibold">totalWallWidth:</span> {{wall.totalWallWidth}}</div>
        <div><span class="font-semibold">displayMode:</span> {{wall.displayMode}}</div>
        <div><span class="font-semibold">provisioningEnabled:</span> {{wall.provisioningEnabled}}</div>
        <div><span class="font-semibold">queueMachineState:</span> {{queueMachineState}}</div>
        <div><span class="font-semibold">queueDepth:</span> {{queueDepth}}</div>
        <div><span class="font-semibold">playing:</span> {{playingText}}</div>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Row FSM</h2>
      <div class="mt-3 grid gap-2 md:grid-cols-2 xl:grid-cols-3">
        {{#each tickerRows}}
          <article class="rounded border border-slate-800 bg-slate-950 p-3 text-sm">
            <div class="font-semibold text-slate-100">Row {{rowNumber}}</div>
            <div class="mt-2 text-slate-400">state: <span class="text-slate-200">{{state}}</span></div>
            <div class="text-slate-400">widthPx: <span class="text-slate-200">{{widthPx}}</span></div>
            <div class="text-slate-400">activeClients: <span class="text-slate-200">{{activeClientCount}}</span></div>
            <div class="text-slate-400">overflowFlashes: <span class="text-slate-200">{{overflowFlashCount}}</span></div>
            <div class="mt-2 truncate text-xs text-slate-500">{{playingText}}</div>
          </article>
        {{/each}}
      </div>
    </section>

    <section class="mt-4 grid gap-4 lg:grid-cols-2">
      <div class="rounded border border-slate-800 bg-slate-900/80 p-4">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Wall State</h2>
        <pre class="mt-3 max-h-96 overflow-auto rounded bg-slate-900 p-3 text-xs text-slate-100">{{wallDebugJson}}</pre>
      </div>

      <div class="rounded border border-slate-800 bg-slate-900/80 p-4">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Clients State</h2>
        <pre class="mt-3 max-h-96 overflow-auto rounded bg-slate-900 p-3 text-xs text-slate-100">{{clientsDebugJson}}</pre>
      </div>
    </section>
  </main>
</template>
