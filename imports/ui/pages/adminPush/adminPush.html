<template name="AdminPushPage">
  <main class="mx-auto min-h-screen max-w-5xl bg-slate-950 px-4 py-6 text-slate-100 sm:px-6 sm:py-8">
    {{> AdminWallNav}}
    <h1 class="text-2xl font-semibold text-slate-50">Admin Push</h1>
    <p class="mt-2 text-sm text-slate-400">Registered APNs devices and quick push controls.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-3 sm:p-4">
      <div class="flex flex-col gap-3 sm:flex-row sm:flex-wrap sm:items-center sm:justify-between">
        <div class="text-sm text-slate-300">
          <span class="font-semibold">Devices:</span> {{deviceCount}}
        </div>
        <button
          type="button"
          class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
          data-action="send-yo-to-all"
        >
          Send "yo" To All
        </button>
        <button
          type="button"
          class="rounded border border-red-900 bg-red-950 px-3 py-2 text-sm text-red-100 hover:bg-red-900"
          data-action="flush-devices"
        >
          Flush DB
        </button>
      </div>
      <pre class="mt-4 overflow-auto rounded bg-slate-950 p-3 text-xs text-slate-300">POST /api/apns/register
{
  "token": "...",
  "bundleId": "dev.sms.test",
  "deviceName": "Samuel iPhone"
}</pre>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-950">
      {{#if hasDevices}}
        <div class="divide-y divide-slate-800">
          {{#each devices}}
            <article class="grid gap-3 px-4 py-4 md:grid-cols-[1fr_auto] md:items-center">
              <div>
                <div class="text-lg font-semibold text-slate-100">{{deviceLabel}}</div>
                <div class="mt-1 text-sm text-slate-400">
                  <span>{{bundleIdLabel}}</span>
                  <span class="mx-2">·</span>
                  <span>{{updatedAtLabel}}</span>
                </div>
                <div class="mt-2 text-sm text-slate-300">Last push: {{lastSentAtLabel}}</div>
                <div class="mt-1 text-sm text-slate-400">{{lastStatusLabel}}</div>
                <div class="mt-2 font-mono text-xs text-slate-500">{{tokenPreview}}</div>
                <details class="mt-2">
                  <summary class="cursor-pointer text-xs text-slate-500 hover:text-slate-300">Show token</summary>
                  <div class="mt-2 break-all font-mono text-xs text-slate-500">{{token}}</div>
                </details>
              </div>
              <div class="flex flex-col gap-2 sm:flex-row sm:flex-wrap sm:items-center [&>*]:w-full sm:[&>*]:w-auto">
                <button
                  type="button"
                  class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700"
                  data-action="send-yo"
                  data-token="{{token}}"
                >
                  Send "yo"
                </button>
              </div>
            </article>
            <div class="flex px-4 pb-4 sm:justify-end">
              <button
                type="button"
                class="w-full rounded border border-red-900 bg-red-950 px-3 py-2 text-sm text-red-100 hover:bg-red-900 sm:w-auto"
                data-action="delete-device"
                data-token="{{token}}"
              >
                Delete Device
              </button>
            </div>
          {{/each}}
        </div>
      {{else}}
        <div class="px-4 py-8 text-sm text-slate-500">
          No APNs devices registered yet. Register an iPhone by POSTing its token to <code>/api/apns/register</code>.
        </div>
      {{/if}}
    </section>

    {{#if lastResult}}
      <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-3 sm:p-4">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Last Result</h2>
        <pre class="mt-3 max-h-96 overflow-auto rounded bg-slate-950 p-3 text-xs text-slate-100">{{lastResult}}</pre>
      </section>
    {{/if}}
  </main>
</template>
