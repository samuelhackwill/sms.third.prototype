<template name="AdminDiscoPage">
  <main class="mx-auto min-h-screen max-w-5xl bg-slate-950 px-4 py-6 text-slate-100 sm:px-6 sm:py-8">
    {{> AdminWallNav}}
    <h1 class="text-2xl font-semibold text-slate-50">Admin Disco</h1>
    <p class="mt-2 text-sm text-slate-400">Wall-wide color animations on the phone grid.</p>

    <section class="mt-6 rounded border border-slate-800 bg-slate-900/80 p-3 sm:p-4">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Routing</h2>
      <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:flex-wrap sm:items-center [&>*]:w-full sm:[&>*]:w-auto">
        <button type="button" class="rounded border border-cyan-700 bg-cyan-900 px-3 py-2 text-sm font-semibold text-cyan-100 hover:bg-cyan-800" data-action="move-all-clients-to-disco">Move All Clients To /disco</button>
        <button type="button" class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700" data-action="refresh-clients">Force Refresh Clients</button>
        <button type="button" class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700" data-action="toggle-debug">{{debugToggleLabel}}</button>
        <button type="button" class="rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-100 hover:bg-slate-700" data-action="restart">Restart Sequence</button>
      </div>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-3 sm:p-4">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Animation Settings</h2>
        <button
          type="submit"
          form="discoSettingsForm"
          class="rounded border border-sky-700 bg-sky-900 px-3 py-2 text-sm font-semibold text-sky-100 hover:bg-sky-800"
        >
          Apply
        </button>
      </div>
      <form id="discoSettingsForm" class="mt-3 grid gap-3 md:grid-cols-2" data-action="settings">
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>Column Interval (ms)</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100" type="number" step="50" min="50" name="columnIntervalMs" value="{{columnIntervalMs}}" />
        </label>
        <label class="flex flex-col gap-1 text-sm text-slate-200">
          <span>Mode</span>
          <input class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-slate-400" type="text" value="column_wave" disabled />
        </label>
      </form>
    </section>

    <section class="mt-4 rounded border border-slate-800 bg-slate-900/80 p-3 sm:p-4">
      <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-300">Readiness Grid</h2>
        <span class="text-xs text-slate-500">Current wall allocation</span>
      </div>
      <div class="grid gap-2">
        {{#each readinessRows}}
          <div class="-mx-3 overflow-x-auto px-3 sm:mx-0 sm:px-0">
            <div class="grid min-w-[26rem] grid-cols-5 gap-2 sm:min-w-0">
            {{#each this}}
              <article class="min-h-24 rounded border p-2 text-xs {{statusClass}}">
                <div class="font-semibold">#{{slotNumber}} {{shortCode}}</div>
                <div class="mt-1">row: {{rowIndex}}</div>
                <div>col: {{colIndex}}</div>
                <div>{{lastSeenLabel}}</div>
              </article>
            {{/each}}
            </div>
          </div>
        {{/each}}
      </div>
    </section>
  </main>
</template>
