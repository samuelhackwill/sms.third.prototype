<template name="VideoPage">
  <main class="relative h-screen w-screen overflow-hidden bg-black text-white">
    <div id="videoRevealShell" class="absolute inset-0 opacity-0">
      <video
        id="remoteVideoPlayer"
        class="absolute inset-0 h-full w-full object-cover"
        muted
        playsinline
      ></video>
    </div>

    <div class="pointer-events-none absolute inset-0 bg-gradient-to-b from-black/35 via-transparent to-black/55"></div>

    {{#if showDebug}}
      <div class="absolute left-4 top-4 z-10 max-w-[min(42rem,92vw)] rounded-lg border border-red-500/20 bg-black/55 px-4 py-3 text-sm text-red-300 backdrop-blur-sm">
        <div class="text-xs uppercase tracking-[0.18em] text-red-300/70">Video</div>
        <div class="mt-1 break-all font-mono text-[11px] text-red-300/80">{{endpointLabel}}</div>
        {{#if isLoading}}
          <div class="mt-2 text-red-300">Loading clip…</div>
        {{/if}}
        {{#if errorMessage}}
          <div class="mt-2 text-red-200">{{errorMessage}}</div>
        {{/if}}
        {{#if currentSource}}
          <div class="mt-2 break-all text-red-300/85">{{currentSource}}</div>
        {{/if}}
        <div class="mt-2 text-red-300/75">{{trimStatus}}</div>
      </div>

      <pre class="absolute bottom-4 left-4 z-10 max-h-[48vh] w-[min(92vw,90rem)] overflow-auto rounded-lg border border-red-500/20 bg-black/80 p-5 font-mono text-[30px] leading-[1.2] text-red-300 backdrop-blur-sm">{{lastResponse}}</pre>
    {{/if}}

    <div class="absolute bottom-4 right-4 z-10 flex gap-2">
      <button
        type="button"
        class="rounded border border-white/15 bg-black/35 px-3 py-2 text-xs uppercase tracking-[0.18em] text-white/75 transition hover:bg-black/50 hover:text-white"
        data-action="reload-video"
      >
        Reload
      </button>
      <button
        type="button"
        class="rounded border border-white/15 bg-black/35 px-3 py-2 text-xs uppercase tracking-[0.18em] text-white/75 transition hover:bg-black/50 hover:text-white"
        data-action="toggle-mute"
      >
        {{muteButtonLabel}}
      </button>
    </div>
  </main>
</template>
