<template name="TelevisionPage">
  <main class="relative isolate h-screen w-screen overflow-hidden bg-black text-white">
    <div class="fixed inset-0 overflow-hidden bg-black">
      <video
        id="televisionWallVideo"
        class="absolute max-w-none"
        muted
        playsinline
        preload="auto"
      ></video>
    </div>

    {{#if isProvisioningMode}}
      <div class="pointer-events-none fixed inset-0 bg-emerald-500/80" style="animation: ticker-provisioning-blink 950ms ease-in-out infinite;"></div>
      <div class="pointer-events-none fixed inset-0 flex items-center justify-center">
        <div class="rounded-2xl border border-emerald-200/70 bg-black/70 px-8 py-6 text-center font-mono shadow-2xl">
          <div class="text-sm uppercase tracking-[0.35em] text-emerald-200">Provisioning</div>
          <div class="mt-3 text-7xl font-bold text-white">{{shortCode}}</div>
          <div class="mt-3 text-sm text-emerald-100">Tap this phone to assign its slot.</div>
        </div>
      </div>
    {{/if}}

    {{#if showDebug}}
      <div class="pointer-events-none fixed left-3 top-3 rounded bg-black/60 px-2 py-1 font-mono text-7xl text-blue-300">
        <div>client: {{shortCode}}</div>
        <div>wall: {{wallId}}</div>
        <div>slot: {{slotIndex}}</div>
        <div>row: {{rowIndex}}</div>
        <div>col: {{colIndex}}</div>
        <div>xStart: {{xStart}}</div>
        <div>yStart: {{yStart}}</div>
        <div>assigned: {{#if hasAssignedSlice}}yes{{else}}no (fallback 0,0){{/if}}</div>
        <div>source: {{currentSource}}</div>
        <div>paused: {{mediaPaused}}</div>
        <div>readyState: <span class="{{mediaReadyStateClass}}">{{mediaReadyState}}</span></div>
        <div>networkState: {{mediaNetworkState}}</div>
        <div>currentTime: {{mediaCurrentTime}}</div>
        <div>duration: {{mediaDuration}}</div>
        <div>errorCode: {{mediaErrorCode}}</div>
        <div>lastEvent: {{lastMediaEvent}}</div>
        <div>playError: {{lastPlayError}}</div>
        <div>retryCount: {{retryCount}}</div>
        <div>watchdog: {{watchdogStatus}}</div>
      </div>
    {{/if}}
  </main>
</template>
