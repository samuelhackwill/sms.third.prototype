<template name="TickerPage">
  <main class="relative isolate h-screen w-screen overflow-hidden bg-black text-white">
    <div id="tickerCanvasHost" class="fixed inset-0 h-screen w-screen"></div>
    {{#if isProvisioningMode}}
      <div class="pointer-events-none fixed inset-0 bg-red-600" style="animation: ticker-provisioning-blink 950ms ease-in-out infinite;"></div>
      <div class="pointer-events-none fixed inset-0 flex items-center justify-center">
        <div class="rounded-2xl border border-red-200/70 bg-black/70 px-8 py-6 text-center font-mono shadow-2xl">
          <div class="text-sm uppercase tracking-[0.35em] text-red-200">Provisioning</div>
          <div class="mt-3 text-7xl font-bold text-white">{{shortCode}}</div>
          <div class="mt-3 text-sm text-red-100">Tap this phone to assign its slot.</div>
        </div>
      </div>
    {{/if}}
    {{#if showDebug}}
      <div class="pointer-events-none fixed left-3 top-3 rounded bg-black/60 px-2 py-1 font-mono text-9xl">
        <div>client: {{shortCode}}</div>
        <div>wall: {{wallId}}</div>
        <div>xStart: {{xStart}}</div>
      </div>
    {{/if}}
<!-- 
    {{#if isHighlighted}}
      <div class="fixed inset-0 z-50 flex items-center justify-center border-[12px] border-red-500 bg-black/80">
        <div class="rounded-lg border border-red-300 bg-black/70 px-8 py-6 text-center font-mono">
          <div class="text-sm uppercase tracking-widest text-red-200">Client Highlight</div>
          <div class="mt-2 text-7xl font-bold text-red-100">{{shortCode}}</div>
        </div>
      </div>
    {{/if}} -->
  </main>
</template>
